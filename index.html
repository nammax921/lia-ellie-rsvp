<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lia & Ellie — Первый день рождения</title>
<meta name="description" content="Приглашаем вас на первый день рождения Lia & Ellie!">
<meta property="og:title" content="Lia & Ellie — Первый день рождения">
<meta property="og:description" content="Приглашаем вас на первый день рождения!">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="petals" id="petals" aria-hidden="true"></div>

<button class="music-btn" id="music-btn" type="button" aria-label="Музыка" hidden>
  <span class="music-icon" aria-hidden="true"><i></i><i></i><i></i></span>
</button>
<audio id="bg-music" src="music/song.mp3" loop preload="auto"></audio>

<div class="page">

  <main class="card">
    <svg class="corner-euc corner-tr" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M6 114C40 96 74 64 112 16" fill="none" stroke="#8ba374" stroke-width="2"/>
      <g>
        <ellipse cx="22" cy="96" rx="13" ry="7" fill="#9cb187" transform="rotate(35 22 96)"/>
        <ellipse cx="40" cy="104" rx="13" ry="7" fill="#a7bd93" transform="rotate(-20 40 104)"/>
        <ellipse cx="42" cy="78" rx="12" ry="6.5" fill="#93a97f" transform="rotate(38 42 78)"/>
        <ellipse cx="60" cy="84" rx="12" ry="6.5" fill="#9cb187" transform="rotate(-18 60 84)"/>
        <ellipse cx="64" cy="58" rx="11" ry="6" fill="#a7bd93" transform="rotate(40 64 58)"/>
        <ellipse cx="82" cy="62" rx="11" ry="6" fill="#93a97f" transform="rotate(-16 82 62)"/>

        <ellipse cx="107" cy="22" rx="7" ry="4.5" fill="#93a97f" transform="rotate(44 107 22)"/>
      </g>
    </svg>
    <svg class="corner-euc corner-bl" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M6 114C40 96 74 64 112 16" fill="none" stroke="#8ba374" stroke-width="2"/>
      <g>
        <ellipse cx="22" cy="96" rx="13" ry="7" fill="#9cb187" transform="rotate(35 22 96)"/>
        <ellipse cx="40" cy="104" rx="13" ry="7" fill="#a7bd93" transform="rotate(-20 40 104)"/>
        <ellipse cx="42" cy="78" rx="12" ry="6.5" fill="#93a97f" transform="rotate(38 42 78)"/>
        <ellipse cx="60" cy="84" rx="12" ry="6.5" fill="#9cb187" transform="rotate(-18 60 84)"/>
        <ellipse cx="64" cy="58" rx="11" ry="6" fill="#a7bd93" transform="rotate(40 64 58)"/>
        <ellipse cx="82" cy="62" rx="11" ry="6" fill="#93a97f" transform="rotate(-16 82 62)"/>
        <ellipse cx="86" cy="38" rx="9" ry="5" fill="#9cb187" transform="rotate(42 86 38)"/>
        <ellipse cx="102" cy="40" rx="9" ry="5" fill="#a7bd93" transform="rotate(-14 102 40)"/>
        <ellipse cx="107" cy="22" rx="7" ry="4.5" fill="#93a97f" transform="rotate(44 107 22)"/>
      </g>
    </svg>

    <svg class="bunting" viewBox="0 0 336 50" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M8 10Q168 40 328 10" fill="none" stroke="#b7998b" stroke-width="1.6"/>
      <polygon points="14,11 34,11 24,32" fill="#e8b4b8"/>
      <polygon points="42,15 62,15 52,36" fill="#9caf88"/>
      <polygon points="70,19 90,19 80,40" fill="#e8b4b8"/>
      <polygon points="98,22 118,22 108,43" fill="#9caf88"/>
      <polygon points="126,24 146,24 136,45" fill="#e8b4b8"/>
      <polygon points="154,25 174,25 164,46" fill="#9caf88"/>
      <polygon points="182,24 202,24 192,45" fill="#e8b4b8"/>
      <polygon points="210,22 230,22 220,43" fill="#9caf88"/>
      <polygon points="238,19 258,19 248,40" fill="#e8b4b8"/>
      <polygon points="266,15 286,15 276,36" fill="#9caf88"/>
      <polygon points="294,11 314,11 304,32" fill="#e8b4b8"/>
    </svg>

    <header class="header reveal">
      <div class="hero" aria-hidden="true">
        <svg class="euc euc-left" viewBox="0 0 70 170" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 168C42 132 54 104 43 70 36 48 45 26 41 8" fill="none" stroke="#8ba374" stroke-width="2" stroke-linecap="round"/>
          <ellipse cx="31" cy="150" rx="14" ry="8" fill="#a7bd93" transform="rotate(-28 31 150)"/>
          <ellipse cx="61" cy="134" rx="14" ry="8" fill="#9cb187" transform="rotate(30 61 134)"/>
          <ellipse cx="30" cy="118" rx="13" ry="7.5" fill="#93a97f" transform="rotate(-30 30 118)"/>
          <ellipse cx="57" cy="100" rx="12" ry="7" fill="#a7bd93" transform="rotate(32 57 100)"/>
          <ellipse cx="32" cy="84" rx="11" ry="6.5" fill="#9cb187" transform="rotate(-32 32 84)"/>
          <ellipse cx="50" cy="66" rx="9.5" ry="6" fill="#93a97f" transform="rotate(34 50 66)"/>
          <ellipse cx="37" cy="50" rx="8" ry="5" fill="#a7bd93" transform="rotate(-30 37 50)"/>
          <ellipse cx="43" cy="34" rx="6.5" ry="4.5" fill="#9cb187" transform="rotate(18 43 34)"/>
        </svg>
        <svg class="euc euc-right" viewBox="0 0 70 170" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 168C42 132 54 104 43 70 36 48 45 26 41 8" fill="none" stroke="#8ba374" stroke-width="2" stroke-linecap="round"/>
          <ellipse cx="31" cy="150" rx="14" ry="8" fill="#a7bd93" transform="rotate(-28 31 150)"/>
          <ellipse cx="61" cy="134" rx="14" ry="8" fill="#9cb187" transform="rotate(30 61 134)"/>
          <ellipse cx="30" cy="118" rx="13" ry="7.5" fill="#93a97f" transform="rotate(-30 30 118)"/>
          <ellipse cx="57" cy="100" rx="12" ry="7" fill="#a7bd93" transform="rotate(32 57 100)"/>
          <ellipse cx="32" cy="84" rx="11" ry="6.5" fill="#9cb187" transform="rotate(-32 32 84)"/>
          <ellipse cx="50" cy="66" rx="9.5" ry="6" fill="#93a97f" transform="rotate(34 50 66)"/>
          <ellipse cx="37" cy="50" rx="8" ry="5" fill="#a7bd93" transform="rotate(-30 37 50)"/>
          <ellipse cx="43" cy="34" rx="6.5" ry="4.5" fill="#9cb187" transform="rotate(18 43 34)"/>
        </svg>
        <svg class="bloom bloom-left" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <g fill="#eabac0">
            <ellipse cx="20" cy="9" rx="5.5" ry="8"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(72 20 20)"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(144 20 20)"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(216 20 20)"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(288 20 20)"/>
          </g>
          <circle cx="20" cy="20" r="4.5" fill="#f0d3a2"/>
        </svg>
        <svg class="bloom bloom-right" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
          <g fill="#eabac0">
            <ellipse cx="20" cy="9" rx="5.5" ry="8"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(72 20 20)"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(144 20 20)"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(216 20 20)"/>
            <ellipse cx="20" cy="9" rx="5.5" ry="8" transform="rotate(288 20 20)"/>
          </g>
          <circle cx="20" cy="20" r="4.5" fill="#f0d3a2"/>
        </svg>
        <div class="hero-arch"><span class="hero-teddy">🧸</span></div>
      </div>
      <h1 data-i18n="header.title">LIA &amp; ELLIE</h1>
      <p class="subtitle" data-i18n="header.subtitle">Первый день рождения</p>
      <svg class="heart" viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M16 27C4 18 2 11 7.5 7 11 4.3 15 7.5 16 9.4 17 7.5 21 4.3 24.5 7 30 11 28 18 16 27Z" fill="#e0919b"/>
      </svg>
      <p class="invite invite-1" data-i18n="header.invite1"></p>
      <p class="invite invite-2" data-i18n="header.invite2"></p>
      <p class="invite invite-3" data-i18n="header.invite3"></p>
      <div class="leaf-divider" aria-hidden="true"></div>
      <button type="button" class="cta-rsvp" id="cta-rsvp" data-i18n="rsvp_cta">RSVP now</button>
    </header>

    <!-- MAIN PHOTO: drop photos/hero.jpg into the photos/ folder.
         A missing file falls back to a styled placeholder automatically. -->
    <section class="photos reveal">
      <div class="photo-slot photo-hero">
        <div class="photo-ph" aria-hidden="true">🧸</div>
        <img src="photos/hero.jpg" alt="" loading="lazy" onerror="this.remove()">
      </div>
    </section>

    <!-- INVITATION MESSAGE: title + a second photo (photos/message.jpg) + text -->
    <section class="message reveal">
      <h2 class="section-title" data-i18n="message.title">Приглашение</h2>
      <div class="photo-slot message-photo">
        <div class="photo-ph" aria-hidden="true">🧸</div>
        <img src="photos/message.jpg" alt="" loading="lazy" onerror="this.remove()">
      </div>
      <p class="message-text" data-i18n="message.text">Приглашаем вас на праздник!</p>
    </section>

    <!-- DATE + CALENDAR (numbers come from CONFIG.EVENT_DATE in script.js) -->
    <section class="date-block reveal">
      <p class="date-month" id="date-month"></p>
      <p class="date-day" id="date-day"></p>
      <p class="date-when" id="date-when"></p>
      <div class="calendar" aria-hidden="true">
        <div class="cal-weekdays" id="cal-weekdays"></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </section>

    <!-- TIMELINE (items rendered from translations; photos in photos/t1.jpg … t5.jpg) -->
    <section class="timeline-section">
      <h2 class="section-title reveal" data-i18n="timeline.title">Our Baby's Story</h2>
      <div class="timeline" id="timeline"></div>
    </section>

    <section class="event reveal">
      <img class="venue-logo" src="photos/diyar-logo.png" alt="Дияр" loading="lazy" onerror="this.remove()">
      <div class="event-row">
        <span class="event-icon" aria-hidden="true">📍</span>
        <div class="event-text">
          <span class="event-label" data-i18n="event.whereLabel">Venue</span>
          <span class="event-value" data-i18n="event.venue">[Venue name]</span>
          <span class="event-sub" data-i18n="event.address">[Address]</span>
        </div>
      </div>
      <div class="event-actions">
        <a class="map-btn" id="map-btn" href="#" target="_blank" rel="noopener" data-i18n="event.mapButton" hidden>Open in 2GIS</a>
      </div>
    </section>

    <section class="rsvp reveal" id="rsvp-section">
      <div class="rsvp-loading" id="rsvp-loading" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span data-i18n="rsvp.loading">Loading your invitation…</span>
      </div>

      <p class="rsvp-note" id="rsvp-message" hidden></p>

      <div class="rsvp-controls" id="rsvp-controls" hidden>
        <p class="rsvp-already" id="rsvp-already" hidden></p>
        <p class="rsvp-greeting" id="rsvp-greeting"></p>
        <p class="rsvp-question" data-i18n="rsvp.question">Will you be able to join us?</p>
        <div class="rsvp-buttons">
          <button type="button" class="rsvp-btn rsvp-yes" data-value="yes">
            <span data-i18n="rsvp.yes">Yes, we'll be there</span>
          </button>
          <button type="button" class="rsvp-btn rsvp-no" data-value="no">
            <span data-i18n="rsvp.no">Sorry, we can't make it</span>
          </button>
        </div>
        <p class="field-error" id="rsvp-error" data-i18n="error.submit" hidden>Something went wrong.</p>
      </div>
    </section>

    <div class="confirmation" id="confirmation" hidden>
      <div class="teddy-emoji" aria-hidden="true">🧸</div>
      <h2 data-i18n="confirmation.title">Thank you!</h2>
      <p id="confirmation-message"></p>
    </div>

    <div class="festive-deco" aria-hidden="true">
      <svg class="balloon balloon-a" viewBox="0 0 44 74" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="22" cy="21" rx="17" ry="20" fill="#e8b4b8"/>
        <path d="M22 40l-4 6h8z" fill="#e0a6ac"/>
        <path d="M22 46q7 9 0 15 -6 5 2 9" fill="none" stroke="#cbb1b3" stroke-width="1.2"/>
        <ellipse cx="16" cy="14" rx="3.5" ry="5.5" fill="#fff" opacity="0.45"/>
      </svg>
      <svg class="gift" viewBox="0 0 54 54" xmlns="http://www.w3.org/2000/svg">
        <rect x="9" y="24" width="36" height="26" rx="3" fill="#d89aa0"/>
        <rect x="6" y="18" width="42" height="9" rx="2" fill="#c98790"/>
        <rect x="23" y="18" width="8" height="32" fill="#faf0e6"/>
        <ellipse cx="21" cy="13" rx="6" ry="4.5" fill="#9caf88" transform="rotate(-22 21 13)"/>
        <ellipse cx="33" cy="13" rx="6" ry="4.5" fill="#9caf88" transform="rotate(22 33 13)"/>
        <circle cx="27" cy="15" r="3" fill="#7d9467"/>
      </svg>
      <svg class="balloon balloon-b" viewBox="0 0 44 74" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="22" cy="21" rx="17" ry="20" fill="#9caf88"/>
        <path d="M22 40l-4 6h8z" fill="#869c6f"/>
        <path d="M22 46q-7 9 0 15 6 5 -2 9" fill="none" stroke="#b3c0a3" stroke-width="1.2"/>
        <ellipse cx="16" cy="14" rx="3.5" ry="5.5" fill="#fff" opacity="0.4"/>
      </svg>
    </div>

  </main>
</div>

<div class="lightbox" id="lightbox" hidden>
  <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Закрыть">&times;</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
</div>

<script src="translations.js"></script>
<script src="script.js"></script>
</body>
</html>
