<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lia & Ellie — Первый день рождения</title>
<meta name="description" content="Приглашаем вас на первый день рождения Lia & Ellie!">
<meta property="og:title" content="Lia & Ellie — Первый день рождения">
<meta property="og:description" content="Приглашаем вас на первый день рождения!">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+SC:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=4">
</head>
<body>

<div class="petals" id="petals" aria-hidden="true"></div>

<button class="music-btn" id="music-btn" type="button" aria-label="Музыка" hidden>
  <span class="music-icon" aria-hidden="true"><i></i><i></i><i></i></span>
</button>
<audio id="bg-music" src="music/song.mp3" loop preload="auto"></audio>

<div class="page">

  <main class="card">
    <svg class="corner-euc corner-tr" viewBox="0 0 132 132" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs><filter id="euc-soft-a" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="0.55"/></filter></defs>
      <g filter="url(#euc-soft-a)" opacity="0.8">
        <path d="M8 124C46 106 82 68 124 16" fill="none" stroke="#9aac86" stroke-width="1.3" stroke-linecap="round"/>
        <ellipse cx="24" cy="106" rx="8" ry="12" fill="#aabf97" transform="rotate(52 24 106)"/>
        <ellipse cx="43" cy="112" rx="8" ry="12" fill="#93a87d" transform="rotate(-8 43 112)"/>
        <ellipse cx="47" cy="83" rx="7.5" ry="11" fill="#a0b68d" transform="rotate(55 47 83)"/>
        <ellipse cx="66" cy="87" rx="7.5" ry="11" fill="#8ea477" transform="rotate(-6 66 87)"/>
        <ellipse cx="72" cy="60" rx="7" ry="10" fill="#aabf97" transform="rotate(58 72 60)"/>
        <ellipse cx="91" cy="61" rx="7" ry="10" fill="#93a87d" transform="rotate(-4 91 61)"/>
        <ellipse cx="98" cy="39" rx="6" ry="8.5" fill="#a0b68d" transform="rotate(60 98 39)"/>
        <ellipse cx="115" cy="38" rx="5.5" ry="8" fill="#8ea477" transform="rotate(-2 115 38)"/>
        <ellipse cx="120" cy="22" rx="4.5" ry="6.5" fill="#aabf97" transform="rotate(62 120 22)"/>
      </g>
    </svg>
    <svg class="corner-euc corner-bl" viewBox="0 0 132 132" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs><filter id="euc-soft-b" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="0.55"/></filter></defs>
      <g filter="url(#euc-soft-b)" opacity="0.8">
        <path d="M8 124C46 106 82 68 124 16" fill="none" stroke="#9aac86" stroke-width="1.3" stroke-linecap="round"/>
        <ellipse cx="24" cy="106" rx="8" ry="12" fill="#aabf97" transform="rotate(52 24 106)"/>
        <ellipse cx="43" cy="112" rx="8" ry="12" fill="#93a87d" transform="rotate(-8 43 112)"/>
        <ellipse cx="47" cy="83" rx="7.5" ry="11" fill="#a0b68d" transform="rotate(55 47 83)"/>
        <ellipse cx="66" cy="87" rx="7.5" ry="11" fill="#8ea477" transform="rotate(-6 66 87)"/>
        <ellipse cx="72" cy="60" rx="7" ry="10" fill="#aabf97" transform="rotate(58 72 60)"/>
        <ellipse cx="91" cy="61" rx="7" ry="10" fill="#93a87d" transform="rotate(-4 91 61)"/>
        <ellipse cx="98" cy="39" rx="6" ry="8.5" fill="#a0b68d" transform="rotate(60 98 39)"/>
        <ellipse cx="115" cy="38" rx="5.5" ry="8" fill="#8ea477" transform="rotate(-2 115 38)"/>
        <ellipse cx="120" cy="22" rx="4.5" ry="6.5" fill="#aabf97" transform="rotate(62 120 22)"/>
      </g>
    </svg>

    <header class="header reveal">
      <div class="hero-photo">
        <img src="photos/twins.jpg" alt="Lia и Ellie" fetchpriority="high" width="900" height="927">
      </div>
      <div class="hero-card">
        <p class="hero-eyebrow" data-i18n="header.eyebrow">Приглашение на праздник</p>
        <h1 class="hero-title" data-i18n="header.title">LIA &amp; ELLIE</h1>
        <p class="hero-script" data-i18n="header.script">1 годик</p>
        <div class="hero-after">
          <div class="hero-divider" aria-hidden="true">
            <span class="hd-line"></span>
            <svg class="hd-heart" viewBox="0 0 32 29" xmlns="http://www.w3.org/2000/svg"><path d="M16 27C4 18 2 11 7.5 7 11 4.3 15 7.5 16 9.4 17 7.5 21 4.3 24.5 7 30 11 28 18 16 27Z" fill="#e0919b"/></svg>
            <span class="hd-line"></span>
          </div>
          <p class="hero-date" id="hero-date"></p>
          <p class="hero-closing" data-i18n="header.closing">Будем очень рады разделить с вами этот особенный день!</p>
          <button type="button" class="cta-rsvp" id="cta-rsvp" data-i18n="rsvp_cta">RSVP now</button>
        </div>
      </div>
    </header>

    <!-- INVITATION MESSAGE: a photo (photos/message.jpg) + text -->
    <section class="message reveal">
      <div class="photo-slot message-photo">
        <div class="photo-ph" aria-hidden="true">🧸</div>
        <img src="photos/message.jpg" alt="" loading="lazy" onerror="this.remove()">
      </div>
      <p class="message-text" data-i18n="message.text">Приглашаем вас на праздник!</p>
    </section>

    <!-- DATE + CALENDAR (numbers come from CONFIG.EVENT_DATE in script.js) -->
    <section class="date-block reveal">
      <p class="date-month" id="date-month"></p>
      <p class="date-day" id="date-day"></p>
      <p class="date-when" id="date-when"></p>
      <div class="calendar" aria-hidden="true">
        <div class="cal-weekdays" id="cal-weekdays"></div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </section>

    <!-- TIMELINE (items rendered from translations; photos in photos/t1.jpg … t5.jpg) -->
    <section class="timeline-section">
      <h2 class="section-title reveal" data-i18n="timeline.title">Our Baby's Story</h2>
      <div class="timeline" id="timeline"></div>
    </section>

    <section class="event reveal">
      <img class="venue-logo" src="photos/diyar-logo.png" alt="Дияр" loading="lazy" onerror="this.remove()">
      <div class="event-row">
        <span class="event-icon" aria-hidden="true">📍</span>
        <div class="event-text">
          <span class="event-label" data-i18n="event.whereLabel">Venue</span>
          <span class="event-value" data-i18n="event.venue">[Venue name]</span>
          <span class="event-sub" data-i18n="event.address">[Address]</span>
        </div>
      </div>
      <div class="event-actions">
        <a class="map-btn" id="map-btn" href="#" target="_blank" rel="noopener" data-i18n="event.mapButton" hidden>Open in 2GIS</a>
      </div>
    </section>

    <section class="rsvp reveal" id="rsvp-section">
      <div class="rsvp-loading" id="rsvp-loading" hidden>
        <span class="spinner" aria-hidden="true"></span>
        <span data-i18n="rsvp.loading">Loading your invitation…</span>
      </div>

      <p class="rsvp-note" id="rsvp-message" hidden></p>

      <div class="rsvp-controls" id="rsvp-controls" hidden>
        <p class="rsvp-already" id="rsvp-already" hidden></p>
        <p class="rsvp-greeting" id="rsvp-greeting"></p>
        <p class="rsvp-question" data-i18n="rsvp.question">Will you be able to join us?</p>
        <div class="rsvp-buttons">
          <button type="button" class="rsvp-btn rsvp-yes" data-value="yes">
            <span data-i18n="rsvp.yes">Yes, we'll be there</span>
          </button>
          <button type="button" class="rsvp-btn rsvp-no" data-value="no">
            <span data-i18n="rsvp.no">Sorry, we can't make it</span>
          </button>
        </div>
        <p class="field-error" id="rsvp-error" data-i18n="error.submit" hidden>Something went wrong.</p>
      </div>
    </section>

    <div class="confirmation" id="confirmation" hidden>
      <div class="teddy-emoji" aria-hidden="true">🧸</div>
      <h2 data-i18n="confirmation.title">Thank you!</h2>
      <p id="confirmation-message"></p>
    </div>

  </main>
</div>

<div class="lightbox" id="lightbox" hidden>
  <button type="button" class="lightbox-close" id="lightbox-close" aria-label="Закрыть">&times;</button>
  <img class="lightbox-img" id="lightbox-img" src="" alt="">
</div>

<script src="translations.js?v=3"></script>
<script src="script.js?v=3"></script>
</body>
</html>
